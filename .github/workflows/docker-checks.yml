name: Docker Checks

on:
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: auth-api:pr-${{ github.event.pull_request.number }}

jobs:
  lint:
    name: Lint Dockerfile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

  build:
    name: Build Image
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      image-size: ${{ steps.size.outputs.size }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Get image size
        id: size
        run: |
          SIZE=$(docker image inspect ${{ env.IMAGE_NAME }} --format='{{.Size}}')
          SIZE_MB=$(echo "scale=1; $SIZE / 1048576" | bc)
          echo "size=${SIZE_MB} MB" >> $GITHUB_OUTPUT

  scan:
    name: Trivy Scan
    runs-on: ubuntu-latest
    needs: build
    permissions:
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Rebuild for scan
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}
          cache-from: type=gha

      - name: Scan (CVE système + applicatives)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          vuln-type: os,library
          ignore-unfixed: true

      - name: Scan (secrets)
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          scanners: secret

      - name: Upload résultats SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  report:
    name: Rapport PR
    runs-on: ubuntu-latest
    needs: [build, scan]
    if: always()
    permissions:
      pull-requests: write
    steps:
      - name: Commentaire sur la PR
        uses: actions/github-script@v7
        with:
          script: |
            const scan  = '${{ needs.scan.result }}';
            const size  = '${{ needs.build.outputs.image-size }}';
            const icon  = scan === 'success' ? '✅' : '❌';
            const label = scan === 'success' ? 'Aucune CVE critique/élevée détectée' : 'CVE critiques/élevées détectées';

            const body = [
              '## Docker Checks',
              '',
              `| Check | Résultat |`,
              `|-------|----------|`,
              `| Lint Dockerfile | ${{ needs.lint.result === 'success' && '✅ OK' || '❌ Échec' }} |`,
              `| Build image     | ${{ needs.build.result === 'success' && '✅ OK' || '❌ Échec' }} |`,
              `| Scan sécurité   | ${icon} ${label} |`,
              `| Taille image    | 📦 ${size} |`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
