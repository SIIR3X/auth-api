name: Docker Checks

on:
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: auth-api:pr-${{ github.event.pull_request.number }}

jobs:
  lint:
    name: Lint Dockerfile
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

  build:
    name: Build Image
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
    outputs:
      image-size: ${{ steps.size.outputs.size }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Get image size
        id: size
        run: |
          SIZE=$(docker image inspect ${{ env.IMAGE_NAME }} --format='{{.Size}}')
          SIZE_MB=$(echo "scale=1; $SIZE / 1048576" | bc)
          echo "size=${SIZE_MB} MB" >> $GITHUB_OUTPUT

      - name: Check image size threshold
        run: |
          SIZE=$(docker image inspect ${{ env.IMAGE_NAME }} --format='{{.Size}}')
          MAX_SIZE=$((200 * 1048576))  # 200 MB
          if [ "$SIZE" -gt "$MAX_SIZE" ]; then
            SIZE_MB=$(echo "scale=1; $SIZE / 1048576" | bc)
            echo "::error::Docker image size (${SIZE_MB} MB) exceeds 200 MB threshold"
            exit 1
          fi

  scan:
    name: Trivy Scan
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Rebuild for scan
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}
          cache-from: type=gha

      - name: Scan (CVE système + applicatives)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          vuln-type: os,library
          ignore-unfixed: true

      - name: Scan (secrets)
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          scanners: secret

