name: Code Quality

on:
  # pull_request (not push): PRs targeting staging - Dependabot's grouped
  # bumps land there - get the same checks as PRs to main.
  pull_request:
    branches:
      - main
      - staging

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Clippy
        # --all-targets also compiles tests and benches, so an API change that
        # breaks them (but not the lib) fails the PR instead of rotting silently.
        run: cargo clippy --all-targets -- -D warnings

  deny:
    name: Dependency Policy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Dependency policy
        run: cargo deny check

