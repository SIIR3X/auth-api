name: Code Quality

on:
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy -- -D warnings

  deny:
    name: Dependency Policy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Dependency policy
        run: cargo deny check

  report:
    name: Quality Report
    runs-on: ubuntu-latest
    needs: [fmt, clippy, deny]
    if: always()
    permissions:
      pull-requests: write
    steps:
      - name: Post report
        uses: actions/github-script@v7
        with:
          script: |
            const fmt    = '${{ needs.fmt.result }}';
            const clippy = '${{ needs.clippy.result }}';
            const deny   = '${{ needs.deny.result }}';

            const icon = r => r === 'success' ? '✅' : r === 'skipped' ? '⏭️' : '❌';

            const body = [
              '## Code Quality',
              '',
              '| Check | Result |',
              '|-------|--------|',
              `| Formatting | ${icon(fmt)} |`,
              `| Clippy | ${icon(clippy)} |`,
              `| Dependency policy | ${icon(deny)} |`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
