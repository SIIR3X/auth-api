name: Tests

# Also on pushes to staging: work lands there directly between PRs, and an
# untested staging defeats the back-merge model.
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - staging

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
  TEST_REDIS_URL: redis://127.0.0.1:6379
  TEST_NATS_URL: nats://127.0.0.1:4222

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # auth-api connects to NATS at startup (fail-fast), so the integration
      # tests need a broker. nats:2-alpine enables monitoring on 8222 by
      # default, which the healthcheck probes.
      nats:
        image: nats:2-alpine
        ports:
          - 4222:4222
        options: >-
          --health-cmd "wget --spider -q http://localhost:8222/healthz"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Install and start Mailpit
        env:
          MAILPIT_VERSION: "1.21.7"
          MAILPIT_SHA256: "db0aaee98c6720e4b7d8d43283767ccb326d60af3e0dc93d74a17fd479fdc908"
        run: |
          curl -sSL "https://github.com/axllent/mailpit/releases/download/v${MAILPIT_VERSION}/mailpit-linux-amd64.tar.gz" \
            -o mailpit.tar.gz
          echo "${MAILPIT_SHA256}  mailpit.tar.gz" | sha256sum -c -
          tar -xzf mailpit.tar.gz mailpit
          sudo mv mailpit /usr/local/bin/mailpit
          rm mailpit.tar.gz
          mailpit --smtp 127.0.0.1:1026 --listen 127.0.0.1:8026 &
          sleep 1

      - name: Install cargo-nextest and cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,cargo-llvm-cov

      # Line coverage sits ~87% (excluding the binary entrypoints and the
      # bench harness, which only run by hand); the 80% gate catches erosion.
      - name: Run tests with coverage
        run: >-
          cargo llvm-cov nextest
          --ignore-filename-regex 'src/(bin/|main\.rs)'
          --lcov --output-path lcov.info
          --fail-under-lines 80

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info
