name: Tests

on:
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
  TEST_REDIS_URL: redis://127.0.0.1:6379

jobs:
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Install and start Mailpit
        run: |
          curl -sSL https://github.com/axllent/mailpit/releases/latest/download/mailpit-linux-amd64.tar.gz \
            | tar -xz mailpit
          sudo mv mailpit /usr/local/bin/mailpit
          mailpit --smtp 127.0.0.1:1026 --listen 127.0.0.1:8026 &
          sleep 1

      - name: Install cargo-nextest and cargo-tarpaulin
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,cargo-tarpaulin

      - name: Run tests
        run: cargo nextest run

      - name: Set up swap for tarpaulin linking
        run: |
          sudo fallocate -l 4G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Run coverage
        run: |
          cargo tarpaulin --tests \
            --skip-clean \
            --exclude-files "src/main.rs" "src/bin/*" \
            --out html --output-dir reports/coverage
