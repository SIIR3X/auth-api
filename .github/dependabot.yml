# Automated dependency updates. This is what makes tag-pinned base images and
# version-pinned actions sustainable: bumps arrive as PRs and go through the
# full CI gauntlet (tests, Trivy, hadolint) like any other change.
version: 2
updates:
  # Version updates target staging so they follow the normal staging -> main
  # release flow. Caveat: Dependabot *security* updates ignore target-branch
  # and still open their PRs against the default branch (main) - deliberate,
  # a CVE fix should not wait for a release cycle.
  - package-ecosystem: cargo
    directory: "/"
    target-branch: staging
    schedule:
      interval: weekly
      day: monday
    # Security updates always open a PR; routine bumps are grouped to keep
    # the noise down.
    groups:
      cargo-minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: "/"
    target-branch: staging
    schedule:
      interval: weekly
      day: monday

  - package-ecosystem: docker
    directories:
      - "/"
    target-branch: staging
    schedule:
      interval: weekly
      day: monday
