services:
  app:
    image: ${RUST_API_IMAGE:?set RUST_API_IMAGE}
    pull_policy: always
    restart: unless-stopped
    init: true

    env_file:
      - ${RUST_API_RUNTIME_ENV_FILE:?set RUST_API_RUNTIME_ENV_FILE}

    ports:
      - "${RUST_API_BIND_IP:-127.0.0.1}:${RUST_API_BIND_PORT:-3000}:3000"

    environment:
      APP_ENV: ${APP_ENV:-production}
      SERVER_HOST: ${SERVER_HOST:-0.0.0.0}
      SERVER_PORT: ${SERVER_PORT:-3000}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:?set APP_PUBLIC_URL}
      TRUSTED_PROXY_CIDRS: ${TRUSTED_PROXY_CIDRS:-}

      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      DB_MAX_CONNECTIONS: ${DB_MAX_CONNECTIONS:-20}
      DB_MIN_CONNECTIONS: ${DB_MIN_CONNECTIONS:-2}
      DB_ACQUIRE_TIMEOUT_SECS: ${DB_ACQUIRE_TIMEOUT_SECS:-30}

      REDIS_URL: ${REDIS_URL:?set REDIS_URL}
      REDIS_POOL_SIZE: ${REDIS_POOL_SIZE:-10}

      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      JWT_PREVIOUS_SECRET: ${JWT_PREVIOUS_SECRET:-}
      JWT_ACCESS_EXPIRY_SECS: ${JWT_ACCESS_EXPIRY_SECS:-900}
      JWT_REFRESH_EXPIRY_SECS: ${JWT_REFRESH_EXPIRY_SECS:-2592000}
      JWT_STRICT_SESSION_BINDING: ${JWT_STRICT_SESSION_BINDING:-false}
      JWT_MAX_SESSION_LIFETIME_SECS: ${JWT_MAX_SESSION_LIFETIME_SECS:-7776000}

      ARGON2_MEMORY_KIB: ${ARGON2_MEMORY_KIB:-65536}
      ARGON2_ITERATIONS: ${ARGON2_ITERATIONS:-3}
      ARGON2_PARALLELISM: ${ARGON2_PARALLELISM:-4}
      TOTP_ISSUER: ${TOTP_ISSUER:-rust-api}
      TOTP_SKEW: ${TOTP_SKEW:-1}
      RECOVERY_CODE_EXPIRY_DAYS: ${RECOVERY_CODE_EXPIRY_DAYS:-365}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?set ENCRYPTION_KEY}
      PREVIOUS_ENCRYPTION_KEY: ${PREVIOUS_ENCRYPTION_KEY:-}

      RATE_LIMIT_RPM: ${RATE_LIMIT_RPM:-300}
      RATE_LIMIT_AUTH_RPM: ${RATE_LIMIT_AUTH_RPM:-20}
      RATE_LIMIT_FAIL_OPEN: ${RATE_LIMIT_FAIL_OPEN:-false}
      RATE_LIMIT_ALLOW_MISSING_IP: ${RATE_LIMIT_ALLOW_MISSING_IP:-false}

      LOCKOUT_THRESHOLD: ${LOCKOUT_THRESHOLD:-10}
      LOCKOUT_DURATION_SECS: ${LOCKOUT_DURATION_SECS:-1800}
      SENSITIVE_ACTION_REAUTH_SECS: ${SENSITIVE_ACTION_REAUTH_SECS:-600}

      GEOIP_DB_PATH: ${GEOIP_DB_PATH:-/app/data/GeoLite2-City.mmdb}
      GEOIP_REQUIRED: ${GEOIP_REQUIRED:-true}
      RISK_ALERT_THRESHOLD: ${RISK_ALERT_THRESHOLD:-30}
      RISK_CHALLENGE_THRESHOLD: ${RISK_CHALLENGE_THRESHOLD:-60}
      RISK_BLOCK_THRESHOLD: ${RISK_BLOCK_THRESHOLD:-80}
      RISK_HISTORY_DAYS: ${RISK_HISTORY_DAYS:-90}

      SMTP_HOST: ${SMTP_HOST:?set SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:?set SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD:?set SMTP_PASSWORD}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-rust-api}
      SMTP_FROM_ADDRESS: ${SMTP_FROM_ADDRESS:?set SMTP_FROM_ADDRESS}
      MAIL_TEMPLATES_DIR: ${MAIL_TEMPLATES_DIR:-/app/templates}
      MAIL_DEFAULT_LOCALE: ${MAIL_DEFAULT_LOCALE:-en}

      CAPTCHA_SECRET: ${CAPTCHA_SECRET:-}
      CAPTCHA_VERIFY_URL: ${CAPTCHA_VERIFY_URL:-https://hcaptcha.com/siteverify}
      CAPTCHA_TIMEOUT_SECS: ${CAPTCHA_TIMEOUT_SECS:-5}
      CAPTCHA_FAIL_OPEN: ${CAPTCHA_FAIL_OPEN:-false}

      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?set CORS_ALLOWED_ORIGINS}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-true}

      AUDIT_LOG_RETENTION_MONTHS: ${AUDIT_LOG_RETENTION_MONTHS:-6}

      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID:?set WEBAUTHN_RP_ID}
      WEBAUTHN_RP_ORIGIN: ${WEBAUTHN_RP_ORIGIN:?set WEBAUTHN_RP_ORIGIN}
      WEBAUTHN_RP_NAME: ${WEBAUTHN_RP_NAME:?set WEBAUTHN_RP_NAME}

      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}

    volumes:
      - type: bind
        source: ${RUST_API_DATA_DIR:-./data}
        target: /app/data
        read_only: true

    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m

    cap_drop:
      - ALL

    security_opt:
      - no-new-privileges:true

    pids_limit: 256
