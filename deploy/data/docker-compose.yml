services:
  postgres:
    image: postgres:${POSTGRES_VERSION:-17}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    command:
      - postgres
      - -c
      - listen_addresses=${POSTGRES_LISTEN_ADDRESSES:-0.0.0.0}
      - -c
      - password_encryption=scram-sha-256
      - -c
      - max_connections=${POSTGRES_MAX_CONNECTIONS:-200}
    ports:
      - "${POSTGRES_BIND_IP:?set POSTGRES_BIND_IP}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - type: bind
        source: ${POSTGRES_DATA_DIR:?set POSTGRES_DATA_DIR}
        target: /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:${REDIS_VERSION:-7.2-alpine}
    restart: unless-stopped
    command:
      - redis-server
      - --bind
      - 0.0.0.0
      - --port
      - ${REDIS_PORT:-6379}
      - --appendonly
      - "yes"
      - --protected-mode
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD:?set REDIS_PASSWORD}
      - --maxmemory-policy
      - noeviction
    ports:
      - "${REDIS_BIND_IP:?set REDIS_BIND_IP}:${REDIS_PORT:-6379}:6379"
    volumes:
      - type: bind
        source: ${REDIS_DATA_DIR:?set REDIS_DATA_DIR}
        target: /data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
