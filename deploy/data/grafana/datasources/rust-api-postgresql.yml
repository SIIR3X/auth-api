apiVersion: 1

datasources:
  - name: PostgreSQL - Rust API
    uid: rust_api_postgres
    type: postgres
    access: proxy
    url: __POSTGRES_HOST__:__POSTGRES_PORT__
    user: __POSTGRES_GRAFANA_USER__
    jsonData:
      database: __POSTGRES_DB__
      sslmode: disable
      postgresVersion: 1700
      timescaledb: false
    secureJsonData:
      password: __POSTGRES_GRAFANA_PASSWORD__
    editable: true
