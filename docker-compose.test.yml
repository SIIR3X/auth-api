services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - test-auth-net

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - test-cache-net

  mailpit:
    image: axllent/mailpit:v1.21
    ports:
      - "1026:1025"
      - "8026:8025"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8025/api/v1/info"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - test-mail-net

  nats:
    image: nats:2-alpine
    ports:
      - "4224:4222"
      - "8224:8222"
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - test-nats-net

networks:
  test-auth-net:
    driver: bridge
  test-cache-net:
    driver: bridge
  test-mail-net:
    driver: bridge
  test-nats-net:
    driver: bridge
