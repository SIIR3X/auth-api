[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
# Reviewed, accepted duplicate versions. Most stem from the `postgres`
# dev-dependency (older rand/getrandom ecosystem) and the Windows platform stub
# crates (build-time only, never used on the Linux runtime target). Listed by
# name so that any *new*, unexpected duplicate still surfaces as a warning.
skip = [
  { crate = "cpufeatures" },
  { crate = "getrandom" },
  { crate = "hashbrown" },
  { crate = "ipnetwork" },
  { crate = "r-efi" },
  { crate = "rand" },
  { crate = "rand_chacha" },
  { crate = "rand_core" },
  { crate = "redox_syscall" },
  { crate = "thiserror" },
  { crate = "thiserror-impl" },
  { crate = "webpki-roots" },
  { crate = "windows-sys" },
  { crate = "windows-targets" },
  { crate = "windows_aarch64_gnullvm" },
  { crate = "windows_aarch64_msvc" },
  { crate = "windows_i686_gnu" },
  { crate = "windows_i686_msvc" },
  { crate = "windows_x86_64_gnu" },
  { crate = "windows_x86_64_gnullvm" },
  { crate = "windows_x86_64_msvc" },
]
skip-tree = []

[licenses]
version = 2
confidence-threshold = 0.9
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  "0BSD",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
  "BSL-1.0",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
]
exceptions = []

[licenses.private]
ignore = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
