services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file: .env.dev
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - gateway-net
      - auth-net
      - cache-net
      - mail-net
      - broker-net

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: auth_api
      POSTGRES_USER: auth_api
      POSTGRES_PASSWORD: auth_api
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_api -d auth_api"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - auth-net
      - admin-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - cache-net

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    restart: unless-stopped
    networks:
      - mail-net

  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"   # client
      - "8222:8222"   # monitoring
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - broker-net

  appsmith:
    image: appsmith/appsmith-ce
    profiles: [admin]
    ports:
      - "8080:80"
    volumes:
      - appsmith_data:/appsmith-stacks
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - admin-net

volumes:
  postgres_dev_data:
  redis_dev_data:
  appsmith_data:

# All networks are compose-managed: the standalone deployment model (nginx in
# front, NATS in this file) needs no externally provisioned networks.
networks:
  gateway-net:
    driver: bridge
  auth-net:
    driver: bridge
  cache-net:
    driver: bridge
  mail-net:
    driver: bridge
  admin-net:
    driver: bridge
  broker-net:
    driver: bridge
