# Rate limiting zones - defined at http level, used in server blocks.
#
# These limits act as a first line of defence at the gateway level.
# The application also enforces its own per-endpoint limits via Redis
# (RATE_LIMIT_RPM, RATE_LIMIT_AUTH_RPM). Both layers are intentionally
# active: Nginx protects against volumetric floods before they reach the
# app, while application-level limits provide per-user and per-token
# granularity. Keep Nginx limits >= application limits to avoid masking
# application-level 429 responses with gateway-level 429s.
limit_req_zone $binary_remote_addr zone=api_general:10m rate=300r/m;
limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=20r/m;

server {
    listen 80;
    server_name _;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.example.com;

    # ---------------------------------------------------------------------------
    # TLS
    # ---------------------------------------------------------------------------

    ssl_certificate     /etc/letsencrypt/live/api.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.example.com/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # OCSP stapling
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 1.0.0.1 valid=300s;
    resolver_timeout    5s;

    # ---------------------------------------------------------------------------
    # Security headers
    # ---------------------------------------------------------------------------

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY"                                          always;
    add_header X-Content-Type-Options    "nosniff"                                       always;
    add_header Referrer-Policy           "no-referrer"                                   always;
    add_header Content-Security-Policy   "default-src 'none'"                            always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"      always;

    # Hide Nginx version
    server_tokens off;

    # ---------------------------------------------------------------------------
    # Request limits
    # ---------------------------------------------------------------------------

    client_max_body_size    64k;
    client_body_timeout     10s;
    client_header_timeout   10s;

    # ---------------------------------------------------------------------------
    # Block unwanted access
    # ---------------------------------------------------------------------------

    # Hidden files (.env, .git, etc.)
    location ~ /\. {
        deny all;
    }

    # Block unsupported HTTP methods
    if ($request_method !~ ^(GET|POST|PATCH|DELETE|OPTIONS)$) {
        return 405;
    }

    # ---------------------------------------------------------------------------
    # Auth routes - strict rate limit
    # ---------------------------------------------------------------------------

    location ~ ^/auth/(register|login|refresh|forgot-password|reset-password|two-factor) {
        limit_req zone=api_auth burst=10 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_hide_header X-Powered-By;

        proxy_read_timeout  10s;
        proxy_send_timeout  10s;
        proxy_connect_timeout 5s;
    }

    # ---------------------------------------------------------------------------
    # All other API routes - general rate limit
    # ---------------------------------------------------------------------------

    location / {
        limit_req zone=api_general burst=50 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_hide_header X-Powered-By;

        proxy_read_timeout  30s;
        proxy_send_timeout  30s;
        proxy_connect_timeout 5s;
    }
}
